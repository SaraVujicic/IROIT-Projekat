name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Simuliramo lokalni build mikroservisa (provera da li se Dockerfile-ovi uspesno bilduju)
    - name: Run CI Docker Build (Dry-Run)
      run: |
        echo "Starting dry-run Docker builds to verify containerization..."
        docker build -t local/apigateway:latest -f ./backend/ApiGateway/Dockerfile ./backend/ApiGateway
        docker build -t local/absenceservice:latest -f ./backend/AbsenceService/Dockerfile ./backend/AbsenceService
        docker build -t local/departmentservice:latest -f ./backend/DepartmentService/DepartmentService.API/Dockerfile ./backend/DepartmentService
        docker build -t local/employeeservice:latest -f ./backend/EmployeeService/Dockerfile ./backend/EmployeeService
        docker build -t local/leavebalanceservice:latest -f ./backend/LeaveBalanceService/Dockerfile ./backend/LeaveBalanceService
        docker build -t local/notificationservice:latest -f ./backend/NotificationService/Dockerfile ./backend/NotificationService
        docker build -t local/requestservice:latest -f ./backend/RequestService/Dockerfile ./backend/RequestService

    # Simuliramo uspesan deploy u lokalno okruzenje
    - name: Local Environment Deployment (Mock)
      run: |
        echo "Simulating Local Deployment..."
        echo "Services successfully built and optimized."
        echo "Status: Active & Healthy on local Docker environment."